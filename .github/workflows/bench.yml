name: Benchmarks

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"  # weekly Monday 3am UTC
  workflow_dispatch:       # manual: gh workflow run bench.yml

permissions:
  contents: write
  deployments: write

env:
  CARGO_TERM_COLOR: always

jobs:
  criterion:
    name: Criterion Trend Publish
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build benchmarks
        run: cargo bench --workspace --exclude tdb-python --no-run

      - name: Run criterion benchmarks
        run: |
          cargo bench -p tdb-storage --bench quantization -- --output-format bencher | tee bench-output.txt
          cargo bench -p tdb-storage --bench block_pool -- --output-format bencher | tee -a bench-output.txt
          cargo bench -p tdb-retrieval --bench retrieval -- --output-format bencher | tee -a bench-output.txt
          cargo bench -p tdb-index --bench vamana -- --output-format bencher | tee -a bench-output.txt
          cargo bench -p tdb-index --bench wal -- --output-format bencher | tee -a bench-output.txt
          cargo bench -p tdb-engine --bench engine -- --output-format bencher | tee -a bench-output.txt

      - name: Publish criterion trend to GitHub Pages
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: TardigradeDB Performance
          tool: cargo
          output-file-path: bench-output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          comment-on-alert: true
          alert-threshold: "150%"
          fail-on-alert: false
          benchmark-data-dir-path: dev/bench/data

  full-bench-v1:
    name: Bench V1 Full Matrix
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install runtime deps
        run: python -m pip install --upgrade pip

      - name: Run full benchmark matrix
        env:
          LOCOMO_DATA_PATH: ${{ vars.LOCOMO_DATA_PATH }}
          LONGMEMEVAL_DATA_PATH: ${{ vars.LONGMEMEVAL_DATA_PATH }}
          MEM0_BASE_URL: ${{ vars.MEM0_BASE_URL }}
          MEM0_API_KEY: ${{ secrets.MEM0_API_KEY }}
          LETTA_BASE_URL: ${{ vars.LETTA_BASE_URL }}
          LETTA_API_KEY: ${{ secrets.LETTA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          PYTHONPATH=python python -m tdb_bench run \
            --mode full \
            --config python/tdb_bench/config/default.json \
            --output target/bench-v1/full-run.json
          PYTHONPATH=python python -m tdb_bench report \
            --input target/bench-v1/full-run.json \
            --format md \
            --output target/bench-v1/full-report.md
          PYTHONPATH=python python -m tdb_bench report \
            --input target/bench-v1/full-run.json \
            --format json \
            --output target/bench-v1/full-report.json
          PYTHONPATH=python python -m tdb_bench report \
            --input target/bench-v1/full-run.json \
            --format html \
            --output target/bench-v1/full-report.html
          PYTHONPATH=python python - <<'PY'
          import html
          import json
          from pathlib import Path

          raw = json.loads(Path("target/bench-v1/full-run.json").read_text(encoding="utf-8"))
          pretty = json.dumps(raw, indent=2, sort_keys=True)
          page = (
              "<!doctype html><html lang='en'><head><meta charset='utf-8'>"
              "<meta name='viewport' content='width=device-width, initial-scale=1'>"
              "<title>Benchmark Run JSON</title>"
              "<style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;"
              "background:#0d1117;color:#e6edf3;padding:24px}"
              ".card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px}"
              "pre{white-space:pre-wrap;word-break:break-word}</style></head><body>"
              "<h1>Benchmark Run JSON</h1><div class='card'><pre>"
              + html.escape(pretty)
              + "</pre></div></body></html>"
          )
          Path("target/bench-v1/full-run.html").write_text(page, encoding="utf-8")
          PY

      - name: Checkout gh-pages for baseline comparison
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Compare against previous baseline when available
        run: |
          mkdir -p target/bench-v1
          if [ -f gh-pages/dev/bench-v1/latest-full-run.json ]; then
            if PYTHONPATH=python python -m tdb_bench compare \
              --baseline gh-pages/dev/bench-v1/latest-full-run.json \
              --candidate target/bench-v1/full-run.json \
              --format md \
              --output target/bench-v1/full-compare.md; then
              echo "compare generated"
              PYTHONPATH=python python -m tdb_bench compare \
                --baseline gh-pages/dev/bench-v1/latest-full-run.json \
                --candidate target/bench-v1/full-run.json \
                --format html \
                --output target/bench-v1/full-compare.html
            else
              printf '%s\n' \
                '# Benchmark Comparison' \
                '' \
                'Baseline comparison unavailable for this run.' \
                'The previous `latest-full-run.json` is not compatible with the current comparison schema yet.' \
                > target/bench-v1/full-compare.md
              printf '%s\n' \
                "<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>Benchmark Comparison</title><style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#0d1117;color:#e6edf3;padding:24px}.card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px}</style></head><body><h1>Benchmark Comparison</h1><div class='card'>Baseline comparison unavailable for this run. The previous <code>latest-full-run.json</code> is not compatible with the current comparison schema yet.</div></body></html>" \
                > target/bench-v1/full-compare.html
            fi
          else
            printf '%s\n' \
              '# Benchmark Comparison' \
              '' \
              'No previous baseline found in `gh-pages/dev/bench-v1/latest-full-run.json`.' \
              > target/bench-v1/full-compare.md
            printf '%s\n' \
              "<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>Benchmark Comparison</title><style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#0d1117;color:#e6edf3;padding:24px}.card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px}</style></head><body><h1>Benchmark Comparison</h1><div class='card'>No previous baseline found in <code>gh-pages/dev/bench-v1/latest-full-run.json</code>.</div></body></html>" \
              > target/bench-v1/full-compare.html
          fi

      - name: Upload full benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-v1-full
          if-no-files-found: warn
          path: target/bench-v1

      - name: Publish v1 benchmark summaries to gh-pages
        if: always()
        run: |
          if [ ! -d gh-pages ]; then
            mkdir -p gh-pages
            git -C gh-pages init
            git -C gh-pages checkout -b gh-pages
          fi

          mkdir -p gh-pages/dev/bench-v1/runs/${GITHUB_RUN_ID}
          if [ -f target/bench-v1/full-run.json ]; then
            cp target/bench-v1/full-run.json gh-pages/dev/bench-v1/runs/${GITHUB_RUN_ID}/run.json
            cp target/bench-v1/full-run.json gh-pages/dev/bench-v1/latest-full-run.json
          fi
          if [ -f target/bench-v1/full-run.html ]; then
            cp target/bench-v1/full-run.html gh-pages/dev/bench-v1/runs/${GITHUB_RUN_ID}/run.html
            cp target/bench-v1/full-run.html gh-pages/dev/bench-v1/latest-full-run.html
          fi
          if [ -f target/bench-v1/full-report.md ]; then
            cp target/bench-v1/full-report.md gh-pages/dev/bench-v1/runs/${GITHUB_RUN_ID}/report.md
            cp target/bench-v1/full-report.md gh-pages/dev/bench-v1/latest-full-report.md
          fi
          if [ -f target/bench-v1/full-report.html ]; then
            cp target/bench-v1/full-report.html gh-pages/dev/bench-v1/runs/${GITHUB_RUN_ID}/report.html
            cp target/bench-v1/full-report.html gh-pages/dev/bench-v1/latest-full-report.html
          fi
          if [ -f target/bench-v1/full-report.json ]; then
            cp target/bench-v1/full-report.json gh-pages/dev/bench-v1/runs/${GITHUB_RUN_ID}/report.json
          fi
          if [ -f target/bench-v1/full-compare.md ]; then
            cp target/bench-v1/full-compare.md gh-pages/dev/bench-v1/runs/${GITHUB_RUN_ID}/compare.md
            cp target/bench-v1/full-compare.md gh-pages/dev/bench-v1/latest-full-compare.md
          fi
          if [ -f target/bench-v1/full-compare.html ]; then
            cp target/bench-v1/full-compare.html gh-pages/dev/bench-v1/runs/${GITHUB_RUN_ID}/compare.html
            cp target/bench-v1/full-compare.html gh-pages/dev/bench-v1/latest-full-compare.html
          fi

          git -C gh-pages config user.name "github-actions[bot]"
          git -C gh-pages config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C gh-pages add dev/bench-v1
          git -C gh-pages commit -m "bench-v1 nightly ${GITHUB_RUN_ID}" || true
          git -C gh-pages push https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git HEAD:gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bench-v1-pages-bootstrap:
    name: Bench V1 Pages Bootstrap
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Ensure benchmark latest files exist
        run: |
          if [ ! -d gh-pages/.git ]; then
            mkdir -p gh-pages
            git -C gh-pages init
            git -C gh-pages checkout -b gh-pages
          fi

          mkdir -p gh-pages/dev/bench-v1

          if [ ! -f gh-pages/dev/bench-v1/latest-full-report.md ]; then
            printf '%s\n' \
              '# Benchmark Report' \
              '' \
              'No full benchmark result has been published yet.' \
              'Trigger the **Benchmarks** workflow (`bench.yml`) manually or wait for the scheduled run.' \
              > gh-pages/dev/bench-v1/latest-full-report.md
          fi
          if [ ! -f gh-pages/dev/bench-v1/latest-full-report.html ]; then
            printf '%s\n' \
              "<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>Benchmark Report</title><style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#0d1117;color:#e6edf3;padding:24px}.card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px}.nav{margin-bottom:16px}.nav a{color:#58a6ff;text-decoration:none;margin-right:10px}</style></head><body><div class='nav'><a href='index.html'>Narrative</a><a href='results.html'>Observed Results</a><a href='../bench/index.html'>Criterion</a></div><h1>Benchmark Report</h1><div class='card'>No full benchmark result has been published yet. Trigger the <strong>Benchmarks</strong> workflow (<code>bench.yml</code>) manually or wait for the scheduled run.</div></body></html>" \
              > gh-pages/dev/bench-v1/latest-full-report.html
          fi

          if [ ! -f gh-pages/dev/bench-v1/latest-full-run.json ]; then
            printf '%s\n' \
              '{' \
              '  "run_validity": {' \
              '    "state": "invalid",' \
              '    "reason": "no_full_benchmark_published_yet"' \
              '  },' \
              '  "status_summary": {}' \
              '}' \
              > gh-pages/dev/bench-v1/latest-full-run.json
          fi
          if [ ! -f gh-pages/dev/bench-v1/latest-full-run.html ]; then
            printf '%s\n' \
              "<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>Benchmark Run JSON</title><style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#0d1117;color:#e6edf3;padding:24px}.card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px}.nav{margin-bottom:16px}.nav a{color:#58a6ff;text-decoration:none;margin-right:10px}pre{white-space:pre-wrap;word-break:break-word}</style></head><body><div class='nav'><a href='index.html'>Narrative</a><a href='results.html'>Observed Results</a><a href='latest-full-report.html'>Report</a></div><h1>Benchmark Run JSON</h1><div class='card'><pre>{\n  \"run_validity\": {\n    \"state\": \"invalid\",\n    \"reason\": \"no_full_benchmark_published_yet\"\n  },\n  \"status_summary\": {}\n}</pre></div></body></html>" \
              > gh-pages/dev/bench-v1/latest-full-run.html
          fi

          if [ ! -f gh-pages/dev/bench-v1/latest-full-compare.md ]; then
            printf '%s\n' \
              '# Benchmark Comparison' \
              '' \
              'No full benchmark comparison has been published yet.' \
              > gh-pages/dev/bench-v1/latest-full-compare.md
          fi
          if [ ! -f gh-pages/dev/bench-v1/latest-full-compare.html ]; then
            printf '%s\n' \
              "<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>Benchmark Comparison</title><style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#0d1117;color:#e6edf3;padding:24px}.card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px}.nav{margin-bottom:16px}.nav a{color:#58a6ff;text-decoration:none;margin-right:10px}</style></head><body><div class='nav'><a href='index.html'>Narrative</a><a href='results.html'>Observed Results</a><a href='latest-full-report.html'>Report</a></div><h1>Benchmark Comparison</h1><div class='card'>No full benchmark comparison has been published yet.</div></body></html>" \
              > gh-pages/dev/bench-v1/latest-full-compare.html
          fi

          git -C gh-pages config user.name "github-actions[bot]"
          git -C gh-pages config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C gh-pages add \
            dev/bench-v1/latest-full-report.md \
            dev/bench-v1/latest-full-report.html \
            dev/bench-v1/latest-full-run.json \
            dev/bench-v1/latest-full-run.html \
            dev/bench-v1/latest-full-compare.md \
            dev/bench-v1/latest-full-compare.html
          git -C gh-pages commit -m "bench-v1 bootstrap latest files for ${GITHUB_SHA}" || true
          git -C gh-pages push https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git HEAD:gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
