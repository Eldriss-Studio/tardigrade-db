name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Typos
        uses: crate-ci/typos@master

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest

      - name: Run tests
        run: cargo nextest run --workspace --profile ci

      - name: Run doctests
        run: cargo test --doc --workspace --exclude tdb-python

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - name: Check MSRV
        run: cargo check --workspace

  bench-smoke:
    name: Bench V1 Smoke Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Start Letta service
        run: docker compose -f benchmarks/docker-compose.external.yml up -d letta

      - name: Wait for Letta readiness
        run: |
          for _ in $(seq 1 45); do
            if curl -fsS http://localhost:8283/openapi.json > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Letta did not become ready within timeout" >&2
          exit 1

      - name: Run smoke benchmark profile
        continue-on-error: true
        env:
          LETTA_BASE_URL: http://localhost:8283
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p target/bench-v1
          PYTHONPATH=python python -m tdb_bench run \
            --mode smoke \
            --system tardigrade \
            --system letta \
            --config python/tdb_bench/config/default.json \
            --output target/bench-v1/smoke-run.json
          PYTHONPATH=python python -m tdb_bench report \
            --input target/bench-v1/smoke-run.json \
            --format md \
            --output target/bench-v1/smoke-report.md
          PYTHONPATH=python python -m tdb_bench report \
            --input target/bench-v1/smoke-run.json \
            --format json \
            --output target/bench-v1/smoke-report.json

      - name: Ensure smoke artifact placeholders
        if: always()
        run: |
          mkdir -p target/bench-v1
          if [ ! -f target/bench-v1/smoke-report.json ]; then
            printf '%s\n' \
              '{' \
              '  "run_validity": {' \
              '    "state": "invalid",' \
              '    "reason": "missing_smoke_report_json"' \
              '  },' \
              '  "status_summary": {' \
              '    "failed": 1' \
              '  }' \
              '}' > target/bench-v1/smoke-report.json
          fi
          if [ ! -f target/bench-v1/smoke-report.md ]; then
            printf '%s\n' \
              '# Benchmark Report' \
              '' \
              '- run_validity: `invalid`' \
              '- run_validity_reason: `missing_smoke_report_md`' \
              > target/bench-v1/smoke-report.md
          fi

      - name: Enforce smoke benchmark quality gates
        if: always()
        run: |
          PYTHONPATH=python python -m tdb_bench.ci_gate \
            --input target/bench-v1/smoke-report.json \
            --warn-non-ok-ratio 0.05 \
            --fail-non-ok-ratio 0.20

      - name: Upload smoke benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-v1-smoke
          if-no-files-found: warn
          path: |
            target/bench-v1/smoke-run.json
            target/bench-v1/smoke-report.md
            target/bench-v1/smoke-report.json

      - name: Tear down Letta service
        if: always()
        run: docker compose -f benchmarks/docker-compose.external.yml down -v || true

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build docs
        env:
          RUSTDOCFLAGS: -Dwarnings --html-in-header docs/rustdoc-header.html
        run: cargo doc --workspace --no-deps --document-private-items --exclude tdb-python
      - name: Add redirect to tdb_engine
        run: echo '<meta http-equiv="refresh" content="0; url=tdb_engine/index.html">' > target/doc/index.html
      - name: Include benchmark guide page
        run: |
          mkdir -p target/doc/dev/bench target/doc/dev/bench-v1
          cp docs/bench/index.html target/doc/dev/bench/index.html
          cp docs/bench/v1.html target/doc/dev/bench-v1/index.html
          cp docs/bench/v1-results.md target/doc/dev/bench-v1/results.md
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/doc
          keep_files: true
