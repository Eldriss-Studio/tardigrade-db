[advisories]
# All advisory types (vulnerability, unsound, notice) emit errors by default in v2.
# unmaintained: which crates to check — "workspace" skips transitive-only deps.
unmaintained = "workspace"
yanked = "deny"

[licenses]
# In v2, all licenses are denied unless explicitly allowed. No need for
# unlicensed/copyleft/deny fields — the allowlist is the only mechanism.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
