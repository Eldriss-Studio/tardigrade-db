pre-commit:
  parallel: true
  commands:
    fmt:
      run: cargo fmt --all -- --check
    clippy:
      run: just lint
    doc:
      run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --document-private-items --exclude tdb-python
    typos:
      run: typos
      skip:
        - merge
        - rebase

pre-push:
  parallel: false
  commands:
    test:
      run: just test-ci
    deny:
      run: cargo deny check
